        .card-front, .card-back {

            position: absolute;

            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;

        }
        .card-back {
            background: white;
            color: #333;
            transform: rotateY(180deg);

            { hz: "七", py: "qī", type: "Số từ", vi: "bảy", ex: "七岁。 (Qī suì.)" },
            { hz: "八", py: "bā", type: "Số từ", vi: "tám", ex: "八人。 (Bā rén.)" },
            { hz: "九", py: "jiǔ", type: "Số từ", vi: "chín", ex: "九月。 (Jiǔyuè.)" },
            { hz: "十", py: "shí", type: "Số từ", vi: "mười", ex: "十年。 (Shí nián.)" },
            { hz: "零", py: "líng", type: "Số từ", vi: "không", ex: "零分。 (Líng fēn.)" },
            { hz: "百", py: "bǎi", type: "Số từ", vi: "trăm", ex: "一百。 (Yìbǎi.)" },
            { hz: "千", py: "qiān", type: "Số từ", vi: "ngàn", ex: "一千。 (Yìqiān.)" },
            { hz: "万", py: "wàn", type: "Số từ", vi: "vạn", ex: "一万。 (Yíwàn.)" },
            { hz: "几", py: "jǐ", type: "Số từ", vi: "mấy", ex: "几个人？ (Jǐ ge rén?)" },
            { hz: "鼠", py: "shǔ", type: "Danh từ", vi: "Tý (Chuột)", ex: "我属鼠。" },
            { hz: "牛", py: "niú", type: "Danh từ", vi: "Sửu (Trâu)", ex: "大牛。" },
            { hz: "虎", py: "hǔ", type: "Danh từ", vi: "Dần (Hổ)", ex: "老虎。" },
            { hz: "猫", py: "māo", type: "Danh từ", vi: "Mão (Mèo)", ex: "小猫。" },
            { hz: "龙", py: "lóng", type: "Danh từ", vi: "Thìn (Rồng)", ex: "龙年。" },
            { hz: "蛇", py: "shé", type: "Danh từ", vi: "Tỵ (Rắn)", ex: "青蛇。" },
            { hz: "马", py: "mǎ", type: "Danh từ", vi: "Ngọ (Ngựa)", ex: "小马。" },
            { hz: "羊", py: "yáng", type: "Danh từ", vi: "Mùi (Dê)", ex: "白羊。" },
            { hz: "猴", py: "hóu", type: "Danh từ", vi: "Thân (Khỉ)", ex: "猴子。" },
            { hz: "鸡", py: "jī", type: "Danh từ", vi: "Dậu (Gà)", ex: "公鸡。" },
            { hz: "狗", py: "gǒu", type: "Danh từ", vi: "Tuất (Chó)", ex: "小狗。" },
            { hz: "猪", py: "zhū", type: "Danh từ", vi: "Hợi (Lợn)", ex: "肥猪。" }
        ];

        let state = {
            tab: 'library', score: 0, 
            cardIndex: 0,
            showHz: true, showPy: true, showEx: true,
            searchQuery: "", 
            flashcardList: [...vocabulary],
            typingHzList: [...vocabulary],
            typingViList: [...vocabulary],
            typingHzIndex: 0,
            typingViIndex: 0,
            memoryInputs: {}, startTime: Date.now()
        };

        let writers = []; let flashWriters = []; let isWritingFlash = false;

        // Timer
        function updateTimer() {
            const diff = Math.floor((Date.now() - state.startTime) / 1000);
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            const el = document.getElementById('study-timer');
            if (el) el.innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateTimer, 1000);

        function speak(text) {
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) { window.speechSynthesis.cancel(); return false; }
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'zh-CN'; ut.rate = 0.82; window.speechSynthesis.speak(ut);
                return true;
            }
            return false;
        }

        function launchFireworks() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#bc241c', '#d4af37', '#ffffff'] }); }

        function switchTab(tab) {
            state.tab = tab; isWritingFlash = false;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const label = btn.innerText.toLowerCase();
                const target = tab==='library'?'thư viện':tab==='typingHz'?'hán':tab==='typingVi'?'việt':tab==='flashcard'?'flashcard':'trắc';
                btn.className = label.includes(target) ? "tab-btn flex-1 min-w-[100px] py-3 rounded-xl font-bold transition-all bg-white text-red-800 shadow-lg border-b-4 border-red-800" : "tab-btn flex-1 min-w-[100px] py-3 rounded-xl font-bold transition-all bg-white/50 text-gray-600";
            });
            render();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- ACTIONS ---
        function toggleFlashListen(hz, btn) { if(speak(hz)) { btn.classList.add('active'); setTimeout(() => btn.classList.remove('active'), 1500); } else btn.classList.remove('active'); }

        async function toggleFlashWrite(hz, btn) {
            const staticHz = document.getElementById('static-hz'); const target = document.getElementById('flash-writer-container');
            if (isWritingFlash) {
                isWritingFlash = false; btn.classList.remove('active'); 
                if(staticHz) staticHz.style.opacity = "1";
                if(target) { target.style.display = "none"; target.innerHTML = ""; }
            } else {
                isWritingFlash = true; btn.classList.add('active');
                if(staticHz) staticHz.style.opacity = "0";
                if(target) {
                    target.style.display = "block"; target.innerHTML = "";
                    flashWriters = [];
                    hz.split('').forEach((char, i) => {
                        const div = document.createElement('div'); div.id = `fl-char-${i}`; div.style.display = "inline-block"; target.appendChild(div);
                        const wr = HanziWriter.create(div.id, char, { width: 180, height: 180, padding: 5, strokeAnimationSpeed: 1, delayBetweenStrokes: 200, strokeColor: '#bc241c' });
                        flashWriters.push(wr);
                    });
                    for (const wr of flashWriters) { if (!isWritingFlash) break; await wr.animateCharacter(); }
                }
            }
        }

        function openWritingModal(hz, py) {
            document.getElementById('modal-pinyin').innerText = py; document.getElementById('writer-target').innerHTML = ""; document.getElementById('writing-modal').style.display = "flex";
            writers = [];
            hz.split('').forEach((char, i) => {
                const divId = `lb-char-${i}`; const div = document.createElement('div'); div.id = divId; div.style.display = "inline-block"; document.getElementById('writer-target').appendChild(div);
                const wr = HanziWriter.create(divId, char, { width: 150, height: 150, padding: 5, strokeAnimationSpeed: 1, delayBetweenStrokes: 200, strokeColor: '#bc241c' });
                writers.push(wr);
            });
            animateStrokes();
        }

        function closeWritingModal() { document.getElementById('writing-modal').style.display = "none"; }
        async function animateStrokes() { for (const wr of writers) await wr.animateCharacter(); }

        function parseExample(ex) {
            const res = { hz: ex, py: "", vi: "" }; const m = ex.match(/\(([^)]+)\)/);
            if (m) {
                res.hz = ex.split('(')[0].trim(); const p = m[1].split(' - ');
                res.py = p[0] ? p[0].trim() : ""; res.vi = p[1] ? p[1].trim() : "";
            }
            return res;
        }

        function handleMemoryCheck(inp, correct) {
            const val = inp.value.trim(); state.memoryInputs[correct] = val;
            if (val === correct) {
                inp.classList.remove('wrong'); inp.classList.add('correct'); speak("对"); launchFireworks();
                state.score += 5; document.getElementById('score-val').innerText = state.score;
            } else {
                let isCorr = true; for (let i = 0; i < val.length; i++) { if (val[i] !== correct[i]) { isCorr = false; break; } }
                if (!isCorr || val.length >= correct.length) { inp.classList.remove('correct'); inp.classList.add('wrong'); speak("不对"); }
                else inp.classList.remove('correct', 'wrong');
            }
        }

        // --- RENDER LOGIC ---
        function render() {
            const body = document.getElementById('app-body'); body.innerHTML = '';
            if (state.tab === 'library') renderLibrary(body);
            else if (state.tab === 'typingHz') renderTypingHz(body);
            else if (state.tab === 'typingVi') renderTypingVi(body);
            else if (state.tab === 'flashcard') renderFlashcard(body);
            else if (state.tab === 'quiz') renderQuiz(body);
        }

        function renderLibrary(container) {
            container.innerHTML = `
                <div class="w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 animate-fadeIn">
                    <div class="bg-red-800 p-5 text-white flex flex-wrap justify-between items-center gap-4">
                        <h2 class="font-bold text-lg">Thư viện Mê học trung</h2>
                        <input type="text" id="lib-search" placeholder="Gõ Chữ Hán, Pinyin hoặc Nghĩa..." class="search-box w-full max-sm" value="${state.searchQuery}">
                    </div>
                    <div class="max-h-[65vh] overflow-y-auto scroll-custom">
                        <table class="w-full text-left border-collapse min-w-[1300px]">
                            <thead class="bg-gray-100 text-[11px] uppercase text-gray-500 sticky top-0 z-10 shadow-sm font-bold">
                                <tr>
                                    <th class="p-4">Chữ Hán <button class="toggle-btn" onclick="state.showHz=!state.showHz; updateTableOnly()">Ẩn/Hiện</button></th>
                                    <th class="p-4">Pinyin <button class="toggle-btn" onclick="state.showPy=!state.showPy; updateTableOnly()">Ẩn/Hiện</button></th>
                                    <th class="p-4">Loại từ</th>
                                    <th class="p-4">Nghĩa Việt</th>
                                    <th class="p-4">Ví dụ <button class="toggle-btn" onclick="state.showEx=!state.showEx; updateTableOnly()">Ẩn/Hiện</button></th>
                                    <th class="p-4 text-center">Tập viết</th>
                                    <th class="p-4 text-center">Nghe</th>
                                    <th class="p-4 text-center text-red-800">Nhớ chữ</th>
                                </tr>
                            </thead>
                            <tbody id="lib-tbody" class="divide-y divide-gray-50 text-sm"></tbody>
                        </table>
                    </div>
                </div>`;
            
            const searchInput = document.getElementById('lib-search');
            searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                updateTableOnly();
            });
            updateTableOnly();
        }

        function updateTableOnly() {
            const tbody = document.getElementById('lib-tbody'); if (!tbody) return;
            const q = state.searchQuery.toLowerCase();
            const filtered = vocabulary.filter(v => v.hz.includes(q) || v.py.toLowerCase().includes(q) || v.vi.toLowerCase().includes(q));
            tbody.innerHTML = filtered.map(w => { 
                const ex = parseExample(w.ex);
                const savedVal = state.memoryInputs[w.hz] || "";
                return `<tr class="hover:bg-yellow-50 transition border-b border-gray-100">
                    <td class="p-4 chinese-font text-2xl font-bold text-red-800 ${state.showHz?'':'hidden-content'}">${w.hz}</td>
                    <td class="p-4 text-gray-500 italic ${state.showPy?'':'hidden-content'}">${w.py}</td>
                    <td class="p-4 font-semibold text-blue-600 uppercase text-[10px]">${w.type || '-'}</td>
                    <td class="p-4 font-bold text-gray-700">${w.vi}</td>
                    <td class="p-4 min-w-[320px]">
                        <div class="flex items-start gap-2 bg-red-50/50 p-2 rounded-lg border border-red-100/50 ${state.showEx?'':'hidden-content'}">
                            <div class="flex flex-col flex-1"><span class="chinese-font font-bold text-gray-800">${ex.hz}</span><span class="text-[10px] text-gray-500 italic">${ex.py}</span><span class="text-[11px] text-red-800 font-semibold mt-1">${ex.vi}</span></div>
                            <button onclick="speak('${ex.hz}')" class="text-red-400 p-1">🔊</button>
                        </div>
                    </td>
                    <td class="p-4 text-center"><button onclick="openWritingModal('${w.hz}', '${w.py}')" class="text-china-gold hover:scale-125 transition text-xl">🖊️</button></td>
                    <td class="p-4 text-center"><button onclick="speak('${w.hz}')" class="bg-red-50 p-2 rounded-full text-red-600 shadow-sm">🔊</button></td>
                    <td class="p-4 text-center"><input type="text" value="${savedVal}" placeholder="..." oninput="handleMemoryCheck(this, '${w.hz}')" class="memory-input"></td>
                </tr>`}).join('');
        }

        // TYPING CHINESE
        function renderTypingHz(container) {
            const w = state.typingHzList[state.typingHzIndex];
            container.innerHTML = `<div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border-t-8 border-red-800 text-center animate-fadeIn">
                <button onclick="state.typingHzList=shuffleArray([...vocabulary]); state.typingHzIndex=0; render()" class="mb-4 bg-yellow-500 hover:bg-yellow-600 text-red-900 font-bold py-1 px-4 rounded-full text-[10px] uppercase"><span>🔀</span> Đảo thứ tự gõ</button>
                <h2 class="text-xl font-bold text-gray-500 mb-2 uppercase text-xs">Gõ Chữ Hán Tương Ứng</h2>
                <div class="text-3xl font-bold text-red-800 mb-6 bg-red-50 p-6 rounded-2xl border-2 border-red-100 shadow-inner">${w.vi}</div>
                <input type="text" id="type-input-hz" placeholder="Nhập chữ Hán..." class="w-full p-4 text-2xl text-center chinese-font border-2 border-gray-200 rounded-xl focus:border-red-500 outline-none">
                <div id="fb-hz" class="mt-4 flex flex-col items-center min-h-[60px]">
                    <div id="fb-icon-hz" class="text-4xl"></div>
                    <div id="fb-py-hz" class="text-xl font-bold text-gray-500 italic"></div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button onclick="checkTypingHz()" class="btn-china flex-1 py-3 rounded-xl font-bold">Kiểm tra</button>
                    <button onclick="state.typingHzIndex=(state.typingHzIndex+1)%state.typingHzList.length; render()" class="bg-gray-200 text-gray-600 flex-1 py-3 rounded-xl font-bold">Bỏ qua</button>
                </div>
                <p class="mt-4 text-gray-400 font-bold text-[10px] uppercase">Tiến trình: ${state.typingHzIndex + 1} / ${vocabulary.length}</p>
            </div>`;
            document.getElementById('type-input-hz').focus();
            document.getElementById('type-input-hz').addEventListener('keypress', e => { if(e.key==='Enter') checkTypingHz(); });
        }

        function checkTypingHz() {
            const inp = document.getElementById('type-input-hz'); const val = inp.value.trim();
            const correctWord = state.typingHzList[state.typingHzIndex];
            if (val === correctWord.hz) {
                document.getElementById('fb-icon-hz').innerText = '✅';
                document.getElementById('fb-py-hz').innerText = correctWord.py;
                state.score += 15; document.getElementById('score-val').innerText = state.score;
                speak("太好了"); launchFireworks(); 
                setTimeout(() => { state.typingHzIndex = (state.typingHzIndex + 1) % state.typingHzList.length; render(); }, 2000);
            } else { document.getElementById('fb-icon-hz').innerText = '❌'; speak("不对"); }
        }

        // TYPING VIETNAMESE
        function renderTypingVi(container) {
            const w = state.typingViList[state.typingViIndex];
            container.innerHTML = `<div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border-t-8 border-red-800 text-center animate-fadeIn">
                <button onclick="state.typingViList=shuffleArray([...vocabulary]); state.typingViIndex=0; render()" class="mb-4 bg-yellow-500 hover:bg-yellow-600 text-red-900 font-bold py-1 px-4 rounded-full text-[10px] uppercase"><span>🔀</span> Đảo thứ tự gõ</button>
                <h2 class="text-xl font-bold text-gray-500 mb-2 uppercase text-xs">Gõ Nghĩa Tiếng Việt</h2>
                <div class="text-6xl font-bold text-red-800 mb-6 bg-red-50 p-6 rounded-2xl border-2 border-red-100 chinese-font shadow-inner">${w.hz}</div>
                <input type="text" id="type-input-vi" placeholder="Nhập nghĩa tiếng Việt..." class="w-full p-4 text-lg text-center font-bold border-2 border-gray-200 rounded-xl focus:border-red-500 outline-none">
                <div id="fb-vi" class="mt-4 flex flex-col items-center min-h-[60px]">
                    <div id="fb-icon-vi" class="text-4xl"></div>
                    <div id="fb-py-vi" class="text-xl font-bold text-gray-500 italic"></div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button onclick="checkTypingVi()" class="btn-china flex-1 py-3 rounded-xl font-bold">Kiểm tra</button>
                    <button onclick="state.typingViIndex=(state.typingViIndex+1)%state.typingViList.length; render()" class="bg-gray-200 text-gray-600 flex-1 py-3 rounded-xl font-bold">Bỏ qua</button>
                </div>
                <p class="mt-4 text-gray-400 font-bold text-[10px] uppercase">Tiến trình: ${state.typingViIndex + 1} / ${vocabulary.length}</p>
            </div>`;
            document.getElementById('type-input-vi').focus();
            document.getElementById('type-input-vi').addEventListener('keypress', e => { if(e.key==='Enter') checkTypingVi(); });
        }

        function checkTypingVi() {
            const inp = document.getElementById('type-input-vi'); const val = inp.value.trim().toLowerCase();
            const correctWord = state.typingViList[state.typingViIndex];
            // Compare lowercase and trim
            if (val === correctWord.vi.toLowerCase().split(',')[0].trim()) {
                document.getElementById('fb-icon-vi').innerText = '✅';
                document.getElementById('fb-py-vi').innerText = `${correctWord.py} (${correctWord.vi})`;
                state.score += 15; document.getElementById('score-val').innerText = state.score;
                speak("太好了"); launchFireworks();
                setTimeout(() => { state.typingViIndex = (state.typingViIndex + 1) % state.typingViList.length; render(); }, 2000);
            } else { document.getElementById('fb-icon-vi').innerText = '❌'; speak("不对"); }
        }

        function renderFlashcard(container) {
            const w = state.flashcardList[state.cardIndex];
            container.innerHTML = `
                <div class="flex flex-col items-center w-full animate-fadeIn">
                    <button onclick="state.flashcardList=shuffleArray([...vocabulary]); state.cardIndex=0; render()" class="mb-6 bg-yellow-500 hover:bg-yellow-600 text-red-900 font-bold py-2 px-6 rounded-full shadow transition-all transform active:scale-95 uppercase text-xs"><span>🔀</span> Đảo Flashcard</button>
                    <div class="relative w-80 h-[480px] cursor-pointer group" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner relative w-full h-full">
                            <div class="card-front">
                                <div id="static-hz" class="chinese-font text-8xl mb-2 font-bold transition-opacity duration-300 text-white text-center">${w.hz}</div>
                                <div id="flash-writer-container" onclick="event.stopPropagation()"></div>
                                <span class="text-2xl font-semibold opacity-80 mb-8">${w.py}</span>
                                <div class="flex gap-6 mt-4">
                                    <div onclick="event.stopPropagation(); toggleFlashListen('${w.hz}', this)" class="flash-action-btn"><span>🔊</span><p class="font-bold">NGHE</p></div>
                                    <div onclick="event.stopPropagation(); toggleFlashWrite('${w.hz}', this)" class="flash-action-btn"><span>🖊️</span><p class="font-bold">VIẾT</p></div>
                                </div>
                            </div>
                            <div class="card-back text-center">
                                <p class="text-blue-600 font-bold text-xs uppercase mb-2">${w.type}</p>
                                <h3 class="text-4xl font-bold text-red-800 mb-8">${w.vi}</h3>
                                <button onclick="event.stopPropagation(); this.closest('.group').classList.remove('flipped')" class="btn-china px-6 py-2 rounded-full text-xs font-bold uppercase">Quay lại</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 mt-8 w-full max-w-sm">
                        <button onclick="state.cardIndex=(state.cardIndex-1+state.flashcardList.length)%state.flashcardList.length; render()" class="btn-china flex-1 py-3 rounded-xl font-bold uppercase">Lùi lại</button>
                        <button onclick="state.cardIndex=(state.cardIndex+1)%state.flashcardList.length; render()" class="btn-china flex-1 py-3 rounded-xl font-bold uppercase">Tiếp theo</button>
                    </div>
                </div>`;
        }

        function renderQuiz(container) {
            const w = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            let opts = [w]; while(opts.length<4) { const r = vocabulary[Math.floor(Math.random()*vocabulary.length)]; if(!opts.some(o=>o.hz===r.hz)) opts.push(r); }
            opts.sort(() => Math.random()-0.5);
            container.innerHTML = `<div class="w-full max-w-2xl bg-white p-8 rounded-3xl shadow-xl border-t-8 border-red-800 text-center animate-fadeIn">
                <div class="chinese-font text-8xl font-bold text-red-800 my-4">${w.hz}</div>
                <div class="text-xl text-gray-400 font-medium mb-8 font-semibold">${w.py}</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="quiz-options">
                    ${opts.map(o => `<button onclick="handleQuizSelection(this, '${o.hz}', '${w.hz}')" class="p-5 border-2 border-gray-100 rounded-2xl font-bold text-gray-700 hover:border-red-500 transition-all shadow-sm">${o.vi}</button>`).join('')}
                </div>
            </div>`;
        }

        function handleQuizSelection(btn, sel, cor) {
            const container = document.getElementById('quiz-options'); if(container) container.style.pointerEvents = 'none';
            if (sel === cor) {
                btn.classList.add('quiz-correct'); state.score += 10; document.getElementById('score-val').innerText = state.score;
                speak("对"); launchFireworks(); setTimeout(render, 1500);
            } else { btn.classList.add('quiz-wrong'); speak("不对"); setTimeout(() => { if(container) container.style.pointerEvents = 'auto'; btn.classList.remove('quiz-wrong'); }, 1000); }
        }

        window.onload = render;
    </script>
</body>
</html>
